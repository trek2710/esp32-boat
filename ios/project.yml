# AisRadar — xcodegen project descriptor (v2, ADR-0016).
#
# Fresh BLE-central app for the ais-radar device. Regenerate the project with:
#   xcodegen generate   (then open AisRadar.xcodeproj)
#
# Single iOS app target; sources under Sources/AisRadar/.

name: AisRadar
options:
  bundleIdPrefix: com.koefoed
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_CFBundleDisplayName: "AIS Radar"
    INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: >-
      AIS Radar connects to the ais-radar device over Bluetooth to show
      AIS targets and your position.
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  AisRadar:
    type: application
    platform: iOS
    sources:
      - path: Sources/AisRadar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.koefoed.aisradar
        TARGETED_DEVICE_FAMILY: "1,2"
