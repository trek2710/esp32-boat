; AIS-radar device (v2, ADR-0016)
;
; Self-contained device: ESP32-S3-Touch-AMOLED-1.75-G (onboard LC76G GPS)
; + a Daisy 2+ AIS receiver on a spare UART → AIS targets drawn radar-style
; on the AMOLED when there's a GPS fix, with a BLE link to the iOS companion.
;
; This is its own PlatformIO project (build from this directory):
;     cd devices/ais-radar && pio run
;
; Shared, salvaged code lives in ../../shared and is pulled in via
; lib_extra_dirs (each subdir = a library). Today: shared/ais (AIVDM decode
; + target store). display/ble follow as the bring-up progresses.
;
; Milestone 0 (current): serial AIS-decode test — proves the salvaged
; decoder compiles and runs on the new tree. No display/BLE yet, so no
; LVGL / Arduino_GFX / NimBLE deps here until those steps land.

[env:ais-radar]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600

lib_extra_dirs = ${PROJECT_DIR}/../../shared

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
