; AIS-radar device (v2, ADR-0016)
;
; Self-contained device: ESP32-S3-Touch-AMOLED-1.75-G (onboard LC76G GPS)
; + a Daisy 2+ AIS receiver on a spare UART → AIS targets drawn radar-style
; on the AMOLED when there's a GPS fix, with a BLE link to the iOS companion.
;
; This is its own PlatformIO project (build from this directory):
;     cd devices/ais-radar && pio run
;
; Shared, salvaged code lives in ../../shared and is pulled in via
; lib_extra_dirs (each subdir = a library). Today: shared/ais (AIVDM decode
; + target store). display/ble follow as the bring-up progresses.
;
; Milestone 0+display: serial AIS decode (shared/ais) + AMOLED bring-up
; (shared/display) — LVGL 8.3 over Arduino_GFX/CO5300, AXP2101 PMIC. BLE
; (shared/ble) + the radar render land in later steps.

[env:ais-radar]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
; AMOLED-1.75-G native USB-CDC: the 921600 stub baud-switch yields
; "No serial data received". Use the same flags the v1 TX env used.
upload_speed = 115200
upload_flags =
    --before=usb_reset
    --after=hard_reset
    --no-stub

lib_extra_dirs = ${PROJECT_DIR}/../../shared
lib_deps =
    lvgl/lvgl@8.3.11
    moononournation/GFX Library for Arduino@~1.4.0
    lewisxhe/XPowersLib@^0.2.6
    lewisxhe/SensorLib@^0.4.0
    h2zero/NimBLE-Arduino@^1.4.0

; Pre-build: silence SensorLib's getPoint(0) log spam (see the script).
extra_scripts = pre:scripts/patch_sensorlib.py

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    -DXPOWERS_CHIP_AXP2101
    -DLV_CONF_INCLUDE_SIMPLE
    -I ${PROJECT_DIR}/include
    -I ${PROJECT_DIR}/.pio/libdeps/${PIOENV}
    -include ${PROJECT_DIR}/include/lv_conf.h
