; PlatformIO project config for esp32-boat
;
; Target: Waveshare ESP32-S3-Touch-LCD-2.1
;   - ESP32-S3R8, 8 MB PSRAM, 16 MB flash
;   - 2.1" round IPS 480x480, QSPI (ST77916 controller)
;   - Capacitive touch via I2C (CST820 / CST826)
;
; We build against the stock espressif32 platform + Arduino framework.
; The display is driven by LVGL 8 through lovyan03/LovyanGFX (a generic
; driver we configure for ST77916 QSPI in src/display/lgfx_waveshare21.h).

[platformio]
default_envs = waveshare_esp32s3_touch_lcd_21

; ---------------------------------------------------------------------------
; Common options shared by all build environments below.
; ---------------------------------------------------------------------------
[env]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600
; NMEA2000_esp32 1.0.3 uses ESP32-classic registers that don't exist on
; ESP32-S3 (PERIPH_CAN_MODULE, DPORT_*, CAN_*_IDX, ETS_CAN_INTR_SOURCE). It
; is therefore added only to the production env, not here. The sim env
; compiles without any CAN backend; NmeaBridge.cpp's SIMULATED_DATA branch
; doesn't include NMEA2000_CAN.h, so the missing backend is fine.
; LVGL is pinned EXACTLY to 8.3.11 (no ^ or ~) because:
;   - 8.4.0 shipped with partial v9 API previews that our lv_conf.h (written
;     for 8.3) doesn't satisfy — compile fails with "lv_obj_t does not name
;     a type", "lv_disp_draw_buf_t suggesting lv_draw_buf_t", etc.
;   - Even ~8.3.11 turned out to not be tight enough in practice: PlatformIO
;     had already cached 8.4.0 under .pio/libdeps and reused it without
;     re-resolving. An exact pin + a forced cache clear (below) is the only
;     way to guarantee we're on the intended version.
; When we're ready, upgrading to LVGL 9 is a bigger lv_conf.h + Ui.cpp rewrite.
lib_deps =
    ttlappalainen/NMEA2000-library@^4.22.0
    lvgl/lvgl@8.3.11
    lovyan03/LovyanGFX@^1.2.0
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    ; LVGL config. Belt-and-suspenders approach because we already got bitten
    ; twice by lv_conf.h not being reliably discoverable:
    ;
    ;   1. -DLV_CONF_INCLUDE_SIMPLE tells LVGL's lv_conf_internal.h to do
    ;      #include "lv_conf.h" (vs. the more fragile path-based lookup).
    ;   2. -I ${PROJECT_DIR}/include puts our lv_conf.h on the include path,
    ;      using an absolute path so it resolves regardless of SCons's CWD.
    ;   3. -include ${PROJECT_DIR}/include/lv_conf.h force-prepends lv_conf.h
    ;      to EVERY translation unit before the compiler sees a single line
    ;      of source. This means LV_COLOR_DEPTH, LV_USE_*, etc. are set before
    ;      anything else (Arduino.h, LovyanGFX.hpp, lvgl.h) can be preprocessed.
    ;      Without this, some chain of includes was preventing the second half
    ;      of Ui.cpp from seeing LVGL public-API symbols like lv_disp_drv_t
    ;      and lv_scr_load — the file would compile its structs but fail at
    ;      the first function call into LVGL.
    ; If you ever change lv_conf.h itself, also delete .pio/libdeps so LVGL is
    ; re-resolved against the new config (scripts/package.sh auto-handles this
    ; when platformio.ini changes).
    -DLV_CONF_INCLUDE_SIMPLE
    -I ${PROJECT_DIR}/include
    -I ${PROJECT_DIR}/src
    -include ${PROJECT_DIR}/include/lv_conf.h

; ---------------------------------------------------------------------------
; Production firmware — reads real data from the NMEA 2000 bus.
; NOTE: with the pinned NMEA2000_esp32 1.0.3 this env does NOT currently
; compile on ESP32-S3 (see comment above lib_deps). Before first flashing to
; real hardware we'll either (a) bump to a S3-capable backend such as
; ttlappalainen/NMEA2000_esp32xx, or (b) write a thin TWAI-driver backend.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21]
lib_deps =
    ${env.lib_deps}
    ttlappalainen/NMEA2000_esp32@^1.0.3

; ---------------------------------------------------------------------------
; Bench/desk firmware — ignores the CAN bus and feeds the UI fake values.
; Flash this before the hardware arrives, or when iterating on UI on the desk.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21_sim]
build_flags =
    ${env.build_flags}
    -DSIMULATED_DATA=1

; ---------------------------------------------------------------------------
; Diagnostic build — same as sim, but ui::begin()/ui::tick() are skipped
; (DISPLAY_SAFE_MODE=1). Use this to prove the firmware runs on new hardware
; without the (currently stubbed) display driver. You'll see boot logs, sim
; PGN events, and a 1-Hz heartbeat over serial. No pixels.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21_safe]
build_flags =
    ${env.build_flags}
    -DSIMULATED_DATA=1
    -DDISPLAY_SAFE_MODE=1
