; PlatformIO project config for esp32-boat
;
; Target: Waveshare ESP32-S3-Touch-LCD-2.1
;   - ESP32-S3R8, 8 MB PSRAM, 16 MB flash
;   - 2.1" round IPS 480x480, QSPI (ST77916 controller)
;   - Capacitive touch via I2C (CST820 / CST826)
;
; We build against the stock espressif32 platform + Arduino framework.
; The display is driven by LVGL 8 through lovyan03/LovyanGFX (a generic
; driver we configure for ST77916 QSPI in src/display/lgfx_waveshare21.h).

[platformio]
default_envs = waveshare_esp32s3_touch_lcd_21

; ---------------------------------------------------------------------------
; Common options shared by all build environments below.
; ---------------------------------------------------------------------------
[env]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600
lib_deps =
    ttlappalainen/NMEA2000-library@^4.22.0
    ttlappalainen/NMEA2000_esp32@^1.0.3
    lvgl/lvgl@^8.3.11
    lovyan03/LovyanGFX@^1.2.0
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    -DLV_CONF_INCLUDE_SIMPLE
    -I include
    -I src
    -DLV_CONF_PATH="${PROJECT_DIR}/include/lv_conf.h"

; ---------------------------------------------------------------------------
; Production firmware — reads real data from the NMEA 2000 bus.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21]
; Inherits everything from [env].

; ---------------------------------------------------------------------------
; Bench/desk firmware — ignores the CAN bus and feeds the UI fake values.
; Flash this before the hardware arrives, or when iterating on UI on the desk.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21_sim]
build_flags =
    ${env.build_flags}
    -DSIMULATED_DATA=1
