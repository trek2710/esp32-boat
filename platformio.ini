; PlatformIO project config for esp32-boat
;
; Target: Waveshare ESP32-S3-Touch-LCD-2.1
;   - ESP32-S3R8, 8 MB PSRAM, 16 MB flash
;   - 2.1" round IPS 480x480, QSPI (ST77916 controller)
;   - Capacitive touch via I2C (CST820 / CST826)
;
; We build against the stock espressif32 platform + Arduino framework.
; The display is driven by LVGL 8 through lovyan03/LovyanGFX (a generic
; driver we configure for ST77916 QSPI in src/display/lgfx_waveshare21.h).

[platformio]
default_envs = waveshare_esp32s3_touch_lcd_21

; ---------------------------------------------------------------------------
; Common options shared by all build environments below.
; ---------------------------------------------------------------------------
[env]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600
; NMEA2000_esp32 1.0.3 uses ESP32-classic registers that don't exist on
; ESP32-S3 (PERIPH_CAN_MODULE, DPORT_*, CAN_*_IDX, ETS_CAN_INTR_SOURCE). It
; is therefore added only to the production env, not here. The sim env
; compiles without any CAN backend; NmeaBridge.cpp's SIMULATED_DATA branch
; doesn't include NMEA2000_CAN.h, so the missing backend is fine.
; LVGL is pinned EXACTLY to 8.3.11 (no ^ or ~) because:
;   - 8.4.0 shipped with partial v9 API previews that our lv_conf.h (written
;     for 8.3) doesn't satisfy — compile fails with "lv_obj_t does not name
;     a type", "lv_disp_draw_buf_t suggesting lv_draw_buf_t", etc.
;   - Even ~8.3.11 turned out to not be tight enough in practice: PlatformIO
;     had already cached 8.4.0 under .pio/libdeps and reused it without
;     re-resolving. An exact pin + a forced cache clear (below) is the only
;     way to guarantee we're on the intended version.
; When we're ready, upgrading to LVGL 9 is a bigger lv_conf.h + Ui.cpp rewrite.
lib_deps =
    ttlappalainen/NMEA2000-library@^4.22.0
    lvgl/lvgl@8.3.11
    ; LovyanGFX was removed once src/display/ replaced it with a hand-written
    ; ST77916 QSPI driver (via ESP-IDF spi_master) + CH422G expander driver.
    ; Keeping this block narrated: LovyanGFX never had a Panel_ST77916 for
    ; this board, and LovyanGFX 1.2.20 additionally required LVGL 9 (we're
    ; on 8.3), so the only compatible path was forward without it. If we
    ; ever want extra features (complex font rendering, sprites, etc.) we
    ; can reintroduce a pinned 1.2.0 in an isolated env.
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    ; LVGL config + include path setup.
    ;
    ; Historical note kept here because the include path still reflects it:
    ; when LovyanGFX was in the dependency set, its src/ shipped an lvgl.h
    ; shim that hijacked the unqualified <lvgl.h> include and forwarded to a
    ; partial forward-decl header. Working around that required routing all
    ; LVGL includes via the subpath <lvgl/lvgl.h> — which only the real LVGL
    ; provides at that location — and adding .pio/libdeps/<env>/ as an -I
    ; root so the subpath resolved. LovyanGFX is now gone (see lib_deps),
    ; but keeping <lvgl/lvgl.h> + the -I root costs nothing and insulates
    ; us from any future library re-adding a similar stub.
    ;
    ; lv_conf.h wiring is kept as belt-and-suspenders:
    ;   - LV_CONF_INCLUDE_SIMPLE tells LVGL to do #include "lv_conf.h".
    ;   - -I ${PROJECT_DIR}/include puts our lv_conf.h on the search path.
    ;   - -include force-prepends lv_conf.h to every translation unit, so
    ;     LV_COLOR_DEPTH etc. are defined before any header is parsed.
    ; scripts/package.sh auto-wipes .pio/libdeps/<env>/ whenever platformio.ini
    ; changes, so version pin edits actually take effect on the next build.
    -DLV_CONF_INCLUDE_SIMPLE
    -I ${PROJECT_DIR}/include
    -I ${PROJECT_DIR}/src
    -I ${PROJECT_DIR}/.pio/libdeps/${PIOENV}
    -include ${PROJECT_DIR}/include/lv_conf.h

; ---------------------------------------------------------------------------
; Production firmware — reads real data from the NMEA 2000 bus.
; NOTE: with the pinned NMEA2000_esp32 1.0.3 this env does NOT currently
; compile on ESP32-S3 (see comment above lib_deps). Before first flashing to
; real hardware we'll either (a) bump to a S3-capable backend such as
; ttlappalainen/NMEA2000_esp32xx, or (b) write a thin TWAI-driver backend.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21]
lib_deps =
    ${env.lib_deps}
    ttlappalainen/NMEA2000_esp32@^1.0.3

; ---------------------------------------------------------------------------
; Bench/desk firmware — ignores the CAN bus and feeds the UI fake values.
; Flash this before the hardware arrives, or when iterating on UI on the desk.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21_sim]
build_flags =
    ${env.build_flags}
    -DSIMULATED_DATA=1

; ---------------------------------------------------------------------------
; Diagnostic build — same as sim, but ui::begin()/ui::tick() are skipped
; (DISPLAY_SAFE_MODE=1). Use this to prove the firmware runs on new hardware
; without the (currently stubbed) display driver. You'll see boot logs, sim
; PGN events, and a 1-Hz heartbeat over serial. No pixels.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21_safe]
build_flags =
    ${env.build_flags}
    -DSIMULATED_DATA=1
    -DDISPLAY_SAFE_MODE=1

; ---------------------------------------------------------------------------
; Transmitter (NMEA 2000 → BLE bridge), step 1a scaffold.
;
; Target board: Waveshare ESP32-S3-Touch-AMOLED-1.75-G
;   - ESP32-S3R8, 8 MB octal PSRAM, 16 MB flash (same SoC family as the RX,
;     so all [env]-level board options — platform, partition table, USB-CDC,
;     upload speed — carry over correctly via inheritance).
;   - 1.75" 466×466 AMOLED via SH8601 over QSPI (factory log confirms SH8601,
;     not CO5300 as the listing implied).
;   - CST9217 capacitive touch over I²C.
;   - QMI8658 6-axis IMU, AXP2101 PMIC, PCF85063 RTC, LC76G GNSS (G variant).
;
; Why this env exists separate from the RX envs:
;   - The receiver firmware lives in src/ and pulls in LVGL 8.3.11 + the
;     hand-rolled ST77916 QSPI driver in src/display/. None of that applies
;     to the TX (different panel, different driver IC, no user-facing UI in
;     v1). build_src_filter below excludes src/ entirely and compiles only
;     src_tx/.
;   - We override (don't inherit) lib_deps and build_flags so the LVGL +
;     NMEA2000 deps don't get dragged in. Step 1a is serial-only — no
;     display, no NMEA2000, no BLE. We add those in 1b (AXP2101 init), 1c
;     (SH8601 + LVGL hello), and step 5 (NMEA2000 via NMEA2000_esp32_twai).
;
; Build + flash via:  ./scripts/flash.sh tx
; ---------------------------------------------------------------------------
[env:nmea2k_tx]
build_src_filter = -<*> +<../src_tx/*>
; Step 1b: XPowersLib drives the AXP2101 PMIC. Pinned to a known-good tag
; (~3.1 covers the AXP2101 register set Waveshare's BSP uses). We pull only
; what 1b actually needs; NMEA2000 + display libs come in later steps.
lib_deps =
    lewisxhe/XPowersLib@^0.2.6
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    ; XPowersLib gates AXP2101 support on a build-time switch. Without this
    ; flag the library compiles to a stub and PMU.begin() always returns
    ; false, which would look like "chip not found" on every probe attempt.
    -DXPOWERS_CHIP_AXP2101
; The AMOLED-1.75-G has no USB-Serial bridge — the Type-C goes straight to
; the ESP32-S3's native USB pins. esptool's default "Hard resetting via RTS"
; is therefore a no-op on this board: there's no RTS line wired to RST/EN.
; Tell esptool to use the chip's USB JTAG/Serial Debug Unit for reset, which
; works on native-USB S3 boards. Without this the post-flash reboot doesn't
; fire and the chip stays in the download stub showing the previous frame
; on the AMOLED until you power-cycle manually.
upload_flags =
    --before=usb_reset
    --after=hard_reset
    ; --no-stub bypasses esptool's flasher stub and writes via the ROM
    ; bootloader directly. Slower per-byte but skips the post-stub baud-rate
    ; handshake that's the actual culprit on this native-USB-CDC board:
    ; "Stub running... Changing baud rate to N / A fatal error occurred: No
    ; serial data received." reproduced cleanly at both 921600 and 460800.
    --no-stub
; And drop upload_speed all the way to 115200, which matches the ROM's
; default. With both --no-stub and 115200 there's no rate change attempted
; at any point, eliminating the desync entirely. Native USB CDC ignores baud
; at the wire level (USB FS clocks data regardless), so 115200 here only
; affects the protocol framing, not throughput. Flashes will take a few
; seconds longer than the stub-mode flow but always work.
upload_speed = 115200
