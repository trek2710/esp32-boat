; PlatformIO project config for esp32-boat
;
; Target: Waveshare ESP32-S3-Touch-LCD-2.1
;   - ESP32-S3R8, 8 MB PSRAM, 16 MB flash
;   - 2.1" round IPS 480x480, QSPI (ST77916 controller)
;   - Capacitive touch via I2C (CST820 / CST826)
;
; We build against the stock espressif32 platform + Arduino framework.
; The display is driven by LVGL 8 through lovyan03/LovyanGFX (a generic
; driver we configure for ST77916 QSPI in src/display/lgfx_waveshare21.h).

[platformio]
default_envs = waveshare_esp32s3_touch_lcd_21

; ---------------------------------------------------------------------------
; Common options shared by all build environments below.
; ---------------------------------------------------------------------------
[env]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
upload_speed = 921600
; NMEA2000_esp32 1.0.3 uses ESP32-classic registers that don't exist on
; ESP32-S3 (PERIPH_CAN_MODULE, DPORT_*, CAN_*_IDX, ETS_CAN_INTR_SOURCE). It
; is therefore added only to the production env, not here. The sim env
; compiles without any CAN backend; NmeaBridge.cpp's SIMULATED_DATA branch
; doesn't include NMEA2000_CAN.h, so the missing backend is fine.
; LVGL is pinned EXACTLY to 8.3.11 (no ^ or ~) because:
;   - 8.4.0 shipped with partial v9 API previews that our lv_conf.h (written
;     for 8.3) doesn't satisfy — compile fails with "lv_obj_t does not name
;     a type", "lv_disp_draw_buf_t suggesting lv_draw_buf_t", etc.
;   - Even ~8.3.11 turned out to not be tight enough in practice: PlatformIO
;     had already cached 8.4.0 under .pio/libdeps and reused it without
;     re-resolving. An exact pin + a forced cache clear (below) is the only
;     way to guarantee we're on the intended version.
; When we're ready, upgrading to LVGL 9 is a bigger lv_conf.h + Ui.cpp rewrite.
lib_deps =
    ttlappalainen/NMEA2000-library@^4.22.0
    lvgl/lvgl@8.3.11
    ; LovyanGFX was removed once src/display/ replaced it with a hand-written
    ; ST77916 QSPI driver (via ESP-IDF spi_master) + CH422G expander driver.
    ; Keeping this block narrated: LovyanGFX never had a Panel_ST77916 for
    ; this board, and LovyanGFX 1.2.20 additionally required LVGL 9 (we're
    ; on 8.3), so the only compatible path was forward without it. If we
    ; ever want extra features (complex font rendering, sprites, etc.) we
    ; can reintroduce a pinned 1.2.0 in an isolated env.
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    ; LVGL config + include path setup.
    ;
    ; Historical note kept here because the include path still reflects it:
    ; when LovyanGFX was in the dependency set, its src/ shipped an lvgl.h
    ; shim that hijacked the unqualified <lvgl.h> include and forwarded to a
    ; partial forward-decl header. Working around that required routing all
    ; LVGL includes via the subpath <lvgl/lvgl.h> — which only the real LVGL
    ; provides at that location — and adding .pio/libdeps/<env>/ as an -I
    ; root so the subpath resolved. LovyanGFX is now gone (see lib_deps),
    ; but keeping <lvgl/lvgl.h> + the -I root costs nothing and insulates
    ; us from any future library re-adding a similar stub.
    ;
    ; lv_conf.h wiring is kept as belt-and-suspenders:
    ;   - LV_CONF_INCLUDE_SIMPLE tells LVGL to do #include "lv_conf.h".
    ;   - -I ${PROJECT_DIR}/include puts our lv_conf.h on the search path.
    ;   - -include force-prepends lv_conf.h to every translation unit, so
    ;     LV_COLOR_DEPTH etc. are defined before any header is parsed.
    ; scripts/package.sh auto-wipes .pio/libdeps/<env>/ whenever platformio.ini
    ; changes, so version pin edits actually take effect on the next build.
    -DLV_CONF_INCLUDE_SIMPLE
    -I ${PROJECT_DIR}/include
    -I ${PROJECT_DIR}/src
    -I ${PROJECT_DIR}/.pio/libdeps/${PIOENV}
    -include ${PROJECT_DIR}/include/lv_conf.h

; ---------------------------------------------------------------------------
; Production firmware — reads real data from the NMEA 2000 bus.
; NOTE: with the pinned NMEA2000_esp32 1.0.3 this env does NOT currently
; compile on ESP32-S3 (see comment above lib_deps). Before first flashing to
; real hardware we'll either (a) bump to a S3-capable backend such as
; ttlappalainen/NMEA2000_esp32xx, or (b) write a thin TWAI-driver backend.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21]
lib_deps =
    ${env.lib_deps}
    ttlappalainen/NMEA2000_esp32@^1.0.3

; ---------------------------------------------------------------------------
; Bench/desk firmware — ignores the CAN bus and feeds the UI fake values.
; Flash this before the hardware arrives, or when iterating on UI on the desk.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21_sim]
build_flags =
    ${env.build_flags}
    -DSIMULATED_DATA=1

; ---------------------------------------------------------------------------
; Diagnostic build — same as sim, but ui::begin()/ui::tick() are skipped
; (DISPLAY_SAFE_MODE=1). Use this to prove the firmware runs on new hardware
; without the (currently stubbed) display driver. You'll see boot logs, sim
; PGN events, and a 1-Hz heartbeat over serial. No pixels.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21_safe]
build_flags =
    ${env.build_flags}
    -DSIMULATED_DATA=1
    -DDISPLAY_SAFE_MODE=1

; ---------------------------------------------------------------------------
; BLE-bridged RX firmware (step 4) — RX runs as a BLE central, scans for
; "esp32-boat-tx", subscribes to the five telemetry NOTIFY characteristics
; from include/BoatBle.h, and feeds parsed values into BoatState. NMEA 2000
; backend is NOT compiled in (the dep wouldn't build on S3 anyway, and
; nothing reaches the bus). The simulator is also off — BLE is the data
; source.
;
; lib_deps inherits LVGL + NMEA2000-library from [env] (the parser headers
; are not actually included once DATA_SOURCE_BLE gates them out, so LDF
; will skip building NMEA2000-library at link time). NimBLE-Arduino is
; pinned to the same 1.4.x line the TX uses — same Arduino-ESP32 2.x
; compatibility constraint, same proven version.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21_ble]
lib_deps =
    ${env.lib_deps}
    h2zero/NimBLE-Arduino@^1.4.0
build_flags =
    ${env.build_flags}
    -DDATA_SOURCE_BLE=1

; ---------------------------------------------------------------------------
; WiFi-bridged RX firmware (round 81) — RX joins softAP _wifi_nmea2k as a
; station, subscribes to the virtual N2K bus multicast group (239.255.78.85
; :60001), parses canboat-style JSON, and feeds values into BoatState via
; the same setters the SIMULATED_DATA and DATA_SOURCE_BLE paths use.
;
; Supersedes the BLE env per ../NMEA-converter/docs/adr/0001-wifi-not-ble.md.
; NMEA2000-library is inherited from [env] but LDF skips it at link time
; because no header is included while DATA_SOURCE_WIFI is set. WiFi.h /
; WiFiUdp.h come from the Arduino-ESP32 framework — no extra lib_deps.
; ---------------------------------------------------------------------------
[env:waveshare_esp32s3_touch_lcd_21_wifi]
lib_deps = ${env.lib_deps}
build_flags =
    ${env.build_flags}
    -DDATA_SOURCE_WIFI=1
    -DVBUS_BOARD_KIND=1

; ---------------------------------------------------------------------------
; NMEA0183-AIS → NMEA 2000 converter (round 82 — migrated from the
; standalone NMEA-converter project into this repo as a third firmware
; sibling alongside TX and RX).
;
; Target: Waveshare ESP32-C6-LCD-1.47 (RISC-V, 160 MHz, 8 MB flash,
; 172x320 ST7789). The C6 needs Arduino-ESP32 3.x, which upstream
; PlatformIO platform-espressif32 6.7 (the version the TX/RX envs are
; pinned to) doesn't ship — it's still on Arduino-ESP32 2.x. So this
; env uses the pioarduino fork.
;
; This env does NOT inherit from [env] except by the implicit PIO
; mechanism: every field listed here overrides the S3-specific values
; in [env]. lib_deps and build_flags are intentionally not chained
; from ${env.*} because the LVGL config + NMEA2000_esp32 backend
; baked into those don't apply on C6.
;
; Reads !AIVDM sentences from a Daisy 2+ AIS receiver on UART1 RX
; (GPIO19, 38400 baud) and re-emits as PGN 129038/129039/129040/
; 129794/129802/129809/129810 onto the TWAI bus (GPIO4 TX / GPIO5 RX)
; via an SN65HVD230 transceiver. The 1.47" LCD shows decoded targets.
;
; Build + flash via:  ./scripts/flash.sh converter
; ---------------------------------------------------------------------------
[env:nmea_converter]
platform                       = https://github.com/pioarduino/platform-espressif32.git#54.03.20
board                          = esp32-c6-devkitc-1
framework                      = arduino
board_build.mcu                = esp32c6
board_build.f_cpu              = 160000000L
board_build.flash_mode         = qio
board_build.f_flash            = 80000000L
; Override the S3-only octal-PSRAM memory_type inherited from [env].
; The C6 has no PSRAM and a single QSPI flash; qio_qspi is the
; Arduino-ESP32 3.x memory-type tag for that layout. Setting this to
; empty does NOT override the inherited value (PIO treats empty as
; "no override"), which leaks qio_opi onto the C6 build and breaks
; the framework include resolution (the sdkconfig.h-not-found error).
board_build.arduino.memory_type = qio_qspi
; The C6 board has 8 MB of flash, not the 16 MB the TX/RX boards have.
; default.csv (4 MB app, 1.5 MB SPIFFS) is well above the ~413 KB the
; converter firmware actually uses and works on any board ≥ 4 MB.
board_build.partitions         = default.csv
board_upload.flash_size        = 8MB
monitor_speed                  = 115200
upload_speed                   = 921600
build_src_filter               = -<*> +<../src_converter/*>
lib_deps =
    ttlappalainen/NMEA2000-Library@^4.22.0
    https://github.com/sergei/NMEA2000_esp32_twai.git
    ttlappalainen/NMEA0183
    moononournation/GFX Library for Arduino@^1.6.2
build_flags =
    -DESP32_CAN_TX_PIN=GPIO_NUM_4
    -DESP32_CAN_RX_PIN=GPIO_NUM_5
    -DVBUS_BOARD_KIND=2
    ; Route Arduino `Serial` to the C6's native USB-CDC so Serial.print()
    ; reaches /dev/cu.usbmodem* — without this `Serial` binds to UART0.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

; ---------------------------------------------------------------------------
; Transmitter (NMEA 2000 → WiFi multicast bridge). Round 81 — replaces
; the BLE transport with the shared virtual N2K bus described in
; ../NMEA-converter/docs/adr/0001-0007.md. SoftAP `_wifi_nmea2k` is
; brought up by this firmware (bench-stage choice per ADR-0008); the
; RX `..._wifi` env joins as a station, parses multicast, feeds
; BoatState. BLE is gated out via -DTRANSPORT_WIFI=1.
;
; Forked from [env:nmea2k_tx] below — same board, same display driver,
; same display dependencies. Diffs: NimBLE-Arduino dropped from lib_deps,
; -DTRANSPORT_WIFI=1 added, build_src_filter unchanged (same src_tx/
; tree; main.cpp gates BLE bits internally).
; ---------------------------------------------------------------------------
[env:nmea2k_tx_wifi]
; Round 85 (v1.5b step 7 fix): pull BoatState + magnetic_variation from
; src/ so TX can run its own mirror of the bus state. Lets the Main and
; AIS pages render real values instead of placeholders. The rest of src/
; (NmeaBridge, Ui, etc.) stays excluded — those are RX-side.
build_src_filter = -<*> +<../src_tx/*> +<../src/BoatState.cpp> +<../src/magnetic_variation.cpp>
extra_scripts = pre:scripts/patch_sensorlib.py
lib_deps =
    lewisxhe/XPowersLib@^0.2.6
    lvgl/lvgl@8.3.11
    moononournation/GFX Library for Arduino@~1.4.0
    lewisxhe/SensorLib@^0.4.0
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    -DXPOWERS_CHIP_AXP2101
    -DTRANSPORT_WIFI=1
    -DVBUS_BOARD_KIND=0
    -DLV_CONF_INCLUDE_SIMPLE
    -I ${PROJECT_DIR}/include
    -I ${PROJECT_DIR}/src
    -I ${PROJECT_DIR}/.pio/libdeps/${PIOENV}
    -include ${PROJECT_DIR}/include/lv_conf.h
upload_flags =
    --before=usb_reset
    --after=hard_reset
    --no-stub
upload_speed = 115200

; ---------------------------------------------------------------------------
; Transmitter (NMEA 2000 → BLE bridge), step 1a scaffold.
;
; Target board: Waveshare ESP32-S3-Touch-AMOLED-1.75-G
;   - ESP32-S3R8, 8 MB octal PSRAM, 16 MB flash (same SoC family as the RX,
;     so all [env]-level board options — platform, partition table, USB-CDC,
;     upload speed — carry over correctly via inheritance).
;   - 1.75" 466×466 AMOLED via SH8601 over QSPI (factory log confirms SH8601,
;     not CO5300 as the listing implied).
;   - CST9217 capacitive touch over I²C.
;   - QMI8658 6-axis IMU, AXP2101 PMIC, PCF85063 RTC, LC76G GNSS (G variant).
;
; Why this env exists separate from the RX envs:
;   - The receiver firmware lives in src/ and pulls in LVGL 8.3.11 + the
;     hand-rolled ST77916 QSPI driver in src/display/. None of that applies
;     to the TX (different panel, different driver IC, no user-facing UI in
;     v1). build_src_filter below excludes src/ entirely and compiles only
;     src_tx/.
;   - We override (don't inherit) lib_deps and build_flags so the LVGL +
;     NMEA2000 deps don't get dragged in. Step 1a is serial-only — no
;     display, no NMEA2000, no BLE. We add those in 1b (AXP2101 init), 1c
;     (SH8601 + LVGL hello), and step 5 (NMEA2000 via NMEA2000_esp32_twai).
;
; Build + flash via:  ./scripts/flash.sh tx
; ---------------------------------------------------------------------------
[env:nmea2k_tx]
build_src_filter = -<*> +<../src_tx/*>
; SensorLib v0.4.x has a bug in TouchDrvCST92xx that spams the serial
; log with "Invalid touch point index: 0" whenever a finger is near the
; screen — see scripts/patch_sensorlib.py for the analysis. The pre-build
; hook patches the library file in-place; idempotent and self-healing
; against a libdeps wipe (which scripts/package.sh does on platformio.ini
; changes).
extra_scripts = pre:scripts/patch_sensorlib.py
; Step 1c-i adds lvgl@8.3.11 (same exact pin as the RX env, for the same
; reasons documented at the top of this file). 1c-i only installs the dep
; — src_tx/main.cpp doesn't include <lvgl.h> yet — but having LVGL on the
; lib path now means 1c-ii / 1c-iii / 1c-iv can wire it into the SH8601
; AMOLED driver without another env round-trip.
lib_deps =
    lewisxhe/XPowersLib@^0.2.6
    lvgl/lvgl@8.3.11
    ; Step 1c-ii: SH8601 AMOLED via QSPI. Arduino_GFX has an off-the-shelf
    ; Arduino_SH8601 panel + Arduino_ESP32QSPI bus pair, used by the LilyGo
    ; T-Display-AMOLED community. Saves us hand-rolling a QSPI driver. Will
    ; be wired to LVGL via a flush callback in step 1c-iii.
    ;
    ; Version pin is `~1.4.0` (>=1.4.0,<1.5.0). The 1.5.x line dropped
    ; support for Arduino-ESP32 2.x — it pulls in `esp32-hal-periman.h`
    ; from the 3.x peripheral-manager API, which is missing from our
    ; framework-arduinoespressif32 @ 3.20016.0 (Arduino-ESP32 2.0.16) and
    ; fails to compile. The 1.4.x line still uses the legacy SPI API and
    ; compiles cleanly. If we ever bump the platform to a 5.x ESP-IDF /
    ; 3.x Arduino-ESP32 (which the RX would also need to validate), this
    ; pin can be relaxed back to `^1.4.0`.
    moononournation/GFX Library for Arduino@~1.4.0
    ; Step 3: NimBLE-Arduino is the lighter BLE stack (NimBLE host vs.
    ; Bluedroid). ~200 KB compiled vs. ~700+ KB, and well-suited for a
    ; GATT peripheral with a small set of characteristics like ours. The
    ; 1.4.x line targets Arduino-ESP32 2.0.x cleanly; 2.x requires the
    ; 3.x framework (same compatibility caveat as Arduino_GFX above).
    h2zero/NimBLE-Arduino@^1.4.0
    ; Step 7b: SensorLib (same author as XPowersLib) ships a working
    ; TouchDrvCST92xx class for the CST9217 — handles the 16-bit-register
    ; addressing quirk (data at 0xD000, init at 0xD101) and the packed
    ; 5-byte-per-point coordinate format. Waveshare doesn't publish an
    ; Arduino driver for this board; SensorLib is the de-facto community
    ; driver and is used widely on LilyGo's CST92xx-equipped hardware.
    ; We still drive the chip's RESET line ourselves via the TCA9554
    ; expander (EXIO6) — SensorLib's setPins() expects a direct GPIO.
    lewisxhe/SensorLib@^0.4.0
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    ; XPowersLib gates AXP2101 support on a build-time switch. Without this
    ; flag the library compiles to a stub and PMU.begin() always returns
    ; false, which would look like "chip not found" on every probe attempt.
    -DXPOWERS_CHIP_AXP2101
    ; LVGL config plumbing — mirrors the RX env. We share the same
    ; include/lv_conf.h with the receiver: both boards use the same SoC
    ; (ESP32-S3R8, 8 MB PSRAM), same LVGL version, and RGB565 color depth.
    ; Resolution differs (RX 480×480 vs TX 466×466) but lv_conf.h doesn't
    ; encode that — display dims are configured at runtime when LVGL
    ; binds to the panel driver in step 1c-iii.
    -DLV_CONF_INCLUDE_SIMPLE
    -I ${PROJECT_DIR}/include
    -I ${PROJECT_DIR}/.pio/libdeps/${PIOENV}
    -include ${PROJECT_DIR}/include/lv_conf.h
; The AMOLED-1.75-G has no USB-Serial bridge — the Type-C goes straight to
; the ESP32-S3's native USB pins. esptool's default "Hard resetting via RTS"
; is therefore a no-op on this board: there's no RTS line wired to RST/EN.
; Tell esptool to use the chip's USB JTAG/Serial Debug Unit for reset, which
; works on native-USB S3 boards. Without this the post-flash reboot doesn't
; fire and the chip stays in the download stub showing the previous frame
; on the AMOLED until you power-cycle manually.
upload_flags =
    --before=usb_reset
    --after=hard_reset
    ; --no-stub bypasses esptool's flasher stub and writes via the ROM
    ; bootloader directly. Slower per-byte but skips the post-stub baud-rate
    ; handshake that's the actual culprit on this native-USB-CDC board:
    ; "Stub running... Changing baud rate to N / A fatal error occurred: No
    ; serial data received." reproduced cleanly at both 921600 and 460800.
    --no-stub
; And drop upload_speed all the way to 115200, which matches the ROM's
; default. With both --no-stub and 115200 there's no rate change attempted
; at any point, eliminating the desync entirely. Native USB CDC ignores baud
; at the wire level (USB FS clocks data regardless), so 115200 here only
; affects the protocol framing, not throughput. Flashes will take a few
; seconds longer than the stub-mode flow but always work.
upload_speed = 115200
