name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  platformio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      # CI builds both SIM and SAFE envs. The PROD env still doesn't link —
      # it pulls in NMEA2000_esp32 1.0.3 whose ESP32-classic CAN registers
      # don't exist on the S3 — and is not yet gated on in CI. Once we swap
      # in an S3-capable CAN backend the prod env should be added here too.
      - name: Build sim firmware
        run: pio run -e waveshare_esp32s3_touch_lcd_21_sim

      - name: Build safe firmware
        run: pio run -e waveshare_esp32s3_touch_lcd_21_safe
