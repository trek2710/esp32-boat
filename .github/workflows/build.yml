name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  platformio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      # Only the sim env builds on ESP32-S3 right now. The production env
      # (waveshare_esp32s3_touch_lcd_21) pulls in NMEA2000_esp32 1.0.3, which
      # targets ESP32-classic CAN registers that don't exist on the S3.
      # TODO: re-add `-e waveshare_esp32s3_touch_lcd_21` once we've swapped
      # in a S3-capable CAN backend (NMEA2000_esp32xx or a thin TWAI driver).
      - name: Build sim firmware
        run: pio run -e waveshare_esp32s3_touch_lcd_21_sim
