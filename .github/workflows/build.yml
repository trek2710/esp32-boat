name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  platformio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      # We build the SAFE env only for now. Other envs don't compile:
      #   - sim/prod: unresolved LVGL header issue (lv_color_t, lv_obj_t,
      #     lv_tick_inc "not declared" when our .cpp files include <lvgl.h>,
      #     despite LVGL 8.3.11 being correctly installed and visible in the
      #     dependency graph). Separately under investigation.
      #   - prod: also pulls in NMEA2000_esp32 1.0.3 which targets ESP32-
      #     classic CAN registers that don't exist on the S3.
      # Safe-env firmware has been flashed and confirmed running on real
      # hardware (heartbeats every second, ~363 KB free heap stable), so at
      # least CI here proves the non-UI half of the codebase stays buildable.
      - name: Build safe firmware
        run: pio run -e waveshare_esp32s3_touch_lcd_21_safe
